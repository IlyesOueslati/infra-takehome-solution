apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: postgrest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
      - name: postgrest
        image: postgrest/postgrest
        ports:
        - containerPort: 3000
        env:
        - name: PGRST_DB_URI
          value: postgres://postgrest:postgrest@host.docker.internal:5432/postgrest
        - name: PGRST_DB_ANON_ROLE
          value: postgrest
        - name: PGRST_DB_SCHEMA
          value: public
